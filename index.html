        </div>

            <div id="lista-alunos"></div>

        </div>
    </div>
</div>

    let turmaAtual = "";

    function trocarTurma() {
        turmaAtual = document.getElementById('seletor-turma').value;
        if (!turmaAtual) {
            document.getElementById('area-chamada').style.display = 'none';
            return;
        }
        document.getElementById('area-chamada').style.display = 'block';
        document.getElementById('titulo-turma').innerText = "Turma " + turmaAtual;
        document.getElementById('data-hoje').innerText = new Date().toLocaleDateString('pt-BR');
        renderizarAlunos();
    }

    function renderizarAlunos() {
        const container = document.getElementById('lista-alunos');
        container.innerHTML = '';
        const lista = bancoDeDadosAlunos[turmaAtual] || [];
        lista.forEach((aluno, index) => {
            container.innerHTML += `
                <div class="aluno-linha">
                    <span>${aluno}</span>
                    <div class="btn-group">
                        <input type="radio" class="btn-check" name="status-${index}" id="p-${index}" value="P" checked>
                        <label class="btn btn-outline-success" for="p-${index}">P</label>
                        <input type="radio" class="btn-check" name="status-${index}" id="f-${index}" value="F">
                        <label class="btn btn-outline-danger" for="f-${index}">F</label>
                    </div>
                </div>`;
        });
        window.scrollTo(0,0);
    }

    function salvarChamada() {
        const data = new Date().toLocaleDateString('pt-BR');
        const lista = bancoDeDadosAlunos[turmaAtual];
        let registrosAlunos = [];

        lista.forEach((aluno, index) => {
            const status = document.querySelector(`input[name="status-${index}"]:checked`).value;
            registrosAlunos.push({ Aluno: aluno, Status: status });
        });

        // Pegamos o que já existe ou criamos um objeto vazio
        let historicoGeral = JSON.parse(localStorage.getItem('chamada_v2')) || {};
        
        // Salvamos por data e por turma (sobrescreve se fizer a mesma turma no mesmo dia)
        if (!historicoGeral[data]) historicoGeral[data] = {};
        historicoGeral[data][turmaAtual] = registrosAlunos;

        localStorage.setItem('chamada_v2', JSON.stringify(historicoGeral));
        alert(`Chamada da Turma ${turmaAtual} salva na memória!`);
    }

    function exportarExcelCompleto() {
        const dataHoje = new Date().toLocaleDateString('pt-BR');
        let historicoGeral = JSON.parse(localStorage.getItem('chamada_v2')) || {};
        
        if (!historicoGeral[dataHoje]) {
            return alert("Você ainda não salvou nenhuma chamada hoje!");
        }

        const wb = XLSX.utils.book_new();
        const turmasDoDia = historicoGeral[dataHoje];

        // Criar uma aba para cada turma que foi salva hoje
        Object.keys(turmasDoDia).forEach(turma => {
            const dadosSimplificados = turmasDoDia[turma].map(item => ({
                "Nome do Aluno": item.Aluno,
                "Presença/Falta": item.Status,
                "Data": dataHoje
            }));
            const ws = XLSX.utils.json_to_sheet(dadosSimplificados);
            XLSX.utils.book_append_sheet(wb, ws, "Turma " + turma);
        });

        XLSX.writeFile(wb, `Chamada_Geral_${dataHoje.replace(/\//g, '-')}.xlsx`);
    }

    function limparTudo() {
        if (confirm("Isso apagará todos os registros salvos no aparelho. Tem certeza?")) {
            localStorage.clear();
            location.reload();
        }
    }
