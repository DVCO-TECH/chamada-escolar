<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamada Digital Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --danger-color: #ff4d4d;
            --success-color: #2ecc71;
        }

        body { 
            background: #f8f9fa; 
            padding-bottom: 30px; 
            font-family: 'Poppins', sans-serif;
            color: #333;
        }

        .header-app {
            background: var(--primary-gradient);
            color: white;
            padding: 30px 20px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .card-chamada { 
            background: white; 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            max-width: 500px; 
            margin: -40px auto 20px; 
        }

        .aluno-linha { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 15px; 
            border-radius: 12px;
            margin-bottom: 8px;
            background: #fdfdfd;
            border: 1px solid #f1f1f1;
            transition: all 0.3s ease;
        }

        /* Feedback visual quando marcado falta */
        .aluno-linha.falta {
            background: #fff5f5;
            border-color: #feb2b2;
        }

        .turma-badge { 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            color: #764ba2;
            font-weight: 600;
        }

        .btn-check:checked + .btn-outline-success { background-color: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .btn-check:checked + .btn-outline-danger { background-color: var(--danger-color) !important; color: white; border-color: var(--danger-color); }

        .btn-lg-custom {
            border-radius: 15px;
            padding: 15px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        .btn-lg-custom:active { transform: scale(0.95); }

        .form-select-lg {
            border-radius: 12px;
            border: 2px solid #eee;
            font-size: 1rem;
        }

        /* Esconder barra de rolagem mas manter funcionalidade */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

<div class="header-app text-center">
    <h2 class="animate__animated animate__fadeInDown">Diário Digital</h2>
    <p class="opacity-75">Controle de Presença Inteligente</p>
</div>

<div class="container">
    <div class="card-chamada">
        <div class="mb-4">
            <label class="form-label fw-bold text-muted small">TURMA ATUAL</label>
            <select id="seletor-turma" class="form-select form-select-lg shadow-sm" onchange="trocarTurma()">
                <option value="">Selecione uma sala...</option>
                <optgroup label="Ensino Médio">
                    <option value="1A">1A</option><option value="1B">1B</option><option value="1C">1C</option><option value="1D">1D</option>
                    <option value="2A">2A</option><option value="2B">2B</option><option value="2C">2C</option>
                    <option value="3A">3A</option><option value="3B">3B</option><option value="3C">3C</option>
                </optgroup>
                <optgroup label="Ensino Fundamental">
                    <option value="6A">6A</option><option value="6B">6B</option><option value="6C">6C</option>
                    <option value="7A">7A</option><option value="7B">7B</option>
                    <option value="8A">8A</option><option value="8B">8B</option>
                    <option value="9A">9A</option><option value="9B">9B</option><option value="9C">9C</option>
                </optgroup>
            </select>
        </div>

        <div id="area-chamada" style="display:none;">
            <div class="d-flex justify-content-between align-items-center mb-3 px-1">
                <span class="turma-badge" id="titulo-turma"></span>
                <span id="data-hoje" class="text-muted small"></span>
            </div>
            
            <div id="lista-alunos" class="animate__animated animate__fadeInUp"></div>

            <div class="d-grid gap-2 mt-4">
                <button class="btn btn-success btn-lg-custom shadow animate__animated animate__pulse animate__infinite" onclick="salvarChamada()">
                    ✅ Salvar Chamada
                </button>
            </div>
        </div>

        <div class="mt-5 pt-3 border-top">
            <div class="d-grid gap-2">
                <button class="btn btn-primary btn-lg-custom shadow-sm" onclick="exportarExcelCompleto()">
                    📥 Exportar Relatório Diário (.xlsx)
                </button>
                <button class="btn btn-link btn-sm text-danger mt-2" onclick="limparTudo()">Apagar registros locais</button>
            </div>
        </div>
    </div>
</div>

<script>
    // [O BANCO DE DADOS SEGUE O MESMO QUE VOCÊ JÁ TEM]
    const bancoDeDadosAlunos = {
        "1A": ["AGATHA SOUZA MATOS", "ANA JULIA CONCEIÇÃO SALES", "ANA LIVIA SABINO SANTOS", "ANNA CLARA BARBOSA MANOEL", "BEATRIZ CALDANI COELHO", "CAUÃ RARES DI DONATO RIBEIRO", "DIEGO APARECIDO RODRIGUES PINTO", "EDUARDA DE SOUZA FERREIRA", "ELISA DA SILVA PAIXAO", "ENZO RIBEIRO NAGAI", "GABRIELLY VITORIA DOS SANTOS PEREIRA", "ISABELLY VITORIA RIBEIRO DE MIRANDA", "ITALO MIGUEL DE JESUS PRADO", "JOAO VITOR DE LIMA MACEDO", "JULIO CESAR SANTOS DO NASCIMENTO", "KAIQUE GUSTAVO RODRIGUES CARAÇA", "KAUAN VICENT FRANCO CAVINATTI", "KEYMILLY GABRIELLE RODRIGUES DA COSTA", "KIMBERLY ALVES MENINO", "LARA FERNANDES SANTOS", "LUIS EDUARDO LEOCADIO SILVA", "LUIZ MIGUEL SANTOS MARIANO BARBOSA", "MANUELLA MELO DE SOUZA", "MANUELLY VITÓRIA NUNES CARAÇA", "MICHAELA LAVÍNIA MENEZES DE SOUSA", "MICHEL PIRES FERREIRA", "MIKAELLY MILLIAN DE JESUS BOM SUCESSO DE MORAES", "MONIK VITÓRIA CASSUTI FERREIRA", "NAYARA SOUZA PINHEIRO", "NICOLE HADASSA SANTOS ROSEMBERG", "NICOLLAS RAPHAEL DE SOUZA", "RAQUEL DOS SANTOS", "ROSÂNGELA FERREIRA DE OLIVEIRA", "SOPHIA MIYUKI DA SILVA CARAÇA MISHIMA", "SURIH ALVES GONÇALVES ANTONIO", "THAYLA LAVINIA QUEIROZ ALVES", "VICTOR GABRIEL RODRIGUES", "VINICIUS HENRIQUE SILVA DA CUNHA", "VITOR DOS SANTOS MARIANO", "YAGO RODRIGUES DA SILVA"],
        "1B": ["ANA BEATRIZ IZIDORO BORGES", "ANA BEATRIZ SPESSOTTI DA SILVA", "ANA JULIA DA SILVA BARBOSA", "ANTHONY JUNIOR BUENO DE SOUZA", "BRYAN HENRIQUE ALVES DA CUNHA", "CARLOS HENRIQUE RODRIGUES DE MOURA", "EMANOELLA PAIXÃO DOMENEGHETTI", "EMILLY GODOI EVANGELISTA", "EMILY DE SOUZA FIRIGATO", "ESHILEI TIFANI FERNANDES SOUSA", "GABRIEL HENRIQUE SANTOS DA SILVA", "GABRIEL MACHADO BARBOSA", "HADASSA CRISTINA TEODORO DA SILVA", "HELENA FREIRE ANDRADE", "INGRID APARECIDO PERCILIANO", "ISABELLY MACHADO VALINHOS", "LAIS APARECIDA DA COSTA", "LAVINIA DOS SANTOS BARBOSA", "LIZANDRO MACENA DA CONCEIÇÃO", "MARIA EDUARDA DE ANDRADE SILVA", "MARIA ISABEL SOUZA ROCHA", "MARIA LAURA FLORENCIO DO NASCIMENTO", "MARISA BARBOSA ROZARIO", "MATEUS CAVALCANTE ALVES", "MELISSA DOS SANTOS SOUZA", "NATALY ALVES DE LIMA", "NYCOLLAS MARINHO DA CRUZ", "OLAVO GABRIEL PREVIATTI SIQUEIRA", "PEDRO HENRIQUE RAMOS DE MELO SILVA", "RAQUEL MARIA RODRIGUES", "SAMUEL MENDES PINTO SILVA DE MORAES", "SAMYA TAVARES CUNHA DE ARRUDA", "VITOR GABRIEL FRANCELINO ALMEIDA", "VITOR YUDI HIRA", "VITORIA VITURINO DE LIMA", "YASMIN FERREIRA DE ALMEIDA", "YASMIN GABRIELLY JAQUER GOMES", "ENZO DE OLIVEIRA PIRES", "EDUARDO SANTANA ALVES", "HENRIQUE PRATA BASTOS"],
        // ... (as outras turmas podem ser mantidas aqui normalmente)
    };

    let turmaAtual = "";

    function trocarTurma() {
        turmaAtual = document.getElementById('seletor-turma').value;
        if (!turmaAtual) {
            document.getElementById('area-chamada').style.display = 'none';
            return;
        }
        
        // Efeito visual ao trocar
        const area = document.getElementById('area-chamada');
        area.style.display = 'block';
        area.classList.remove('animate__fadeInUp');
        void area.offsetWidth; // Reset animation
        area.classList.add('animate__fadeInUp');

        document.getElementById('titulo-turma').innerText = "📍 Sala " + turmaAtual;
        document.getElementById('data-hoje').innerText = new Date().toLocaleDateString('pt-BR');
        renderizarAlunos();
    }

    function renderizarAlunos() {
        const container = document.getElementById('lista-alunos');
        container.innerHTML = '';
        const lista = bancoDeDadosAlunos[turmaAtual] || [];
        
        lista.forEach((aluno, index) => {
            const linha = document.createElement('div');
            linha.className = 'aluno-linha';
            linha.id = `linha-${index}`;
            linha.innerHTML = `
                <span class="fw-medium" style="font-size: 0.85rem; max-width: 60%;">${aluno}</span>
                <div class="btn-group" role="group">
                    <input type="radio" class="btn-check" name="status-${index}" id="p-${index}" value="P" checked onchange="marcarLinha(${index}, 'P')">
                    <label class="btn btn-outline-success px-3" for="p-${index}">P</label>
                    
                    <input type="radio" class="btn-check" name="status-${index}" id="f-${index}" value="F" onchange="marcarLinha(${index}, 'F')">
                    <label class="btn btn-outline-danger px-3" for="f-${index}">F</label>
                </div>`;
            container.appendChild(linha);
        });
    }

    function marcarLinha(idx, status) {
        const linha = document.getElementById(`linha-${idx}`);
        if(status === 'F') {
            linha.classList.add('falta');
        } else {
            linha.classList.remove('falta');
        }
    }

    function salvarChamada() {
        const data = new Date().toLocaleDateString('pt-BR');
        const lista = bancoDeDadosAlunos[turmaAtual];
        let registrosAlunos = [];

        lista.forEach((aluno, index) => {
            const status = document.querySelector(`input[name="status-${index}"]:checked`).value;
            registrosAlunos.push({ Aluno: aluno, Status: status });
        });

        let historicoGeral = JSON.parse(localStorage.getItem('chamada_v2')) || {};
        if (!historicoGeral[data]) historicoGeral[data] = {};
        historicoGeral[data][turmaAtual] = registrosAlunos;

        localStorage.setItem('chamada_v2', JSON.stringify(historicoGeral));
        
        // Feedback de sucesso bonito
        const btn = event.target;
        const originalText = btn.innerHTML;
        btn.innerHTML = "💾 SALVO!";
        btn.classList.replace('btn-success', 'btn-dark');
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.classList.replace('btn-dark', 'btn-success');
        }, 2000);
    }

    function exportarExcelCompleto() {
        const dataHoje = new Date().toLocaleDateString('pt-BR');
        let historicoGeral = JSON.parse(localStorage.getItem('chamada_v2')) || {};
        
        if (!historicoGeral[dataHoje]) {
            return alert("Nenhum dado salvo para hoje!");
        }

        const wb = XLSX.utils.book_new();
        Object.keys(historicoGeral[dataHoje]).forEach(turma => {
            const ws = XLSX.utils.json_to_sheet(historicoGeral[dataHoje][turma]);
            XLSX.utils.book_append_sheet(wb, ws, "Sala " + turma);
        });

        XLSX.writeFile(wb, `Chamada_${dataHoje.replace(/\//g, '-')}.xlsx`);
    }

    function limparTudo() {
        if (confirm("Deseja apagar todos os dados do dispositivo?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>

</body>
</html>
